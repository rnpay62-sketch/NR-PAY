<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bank Management</title>
    <style>
        /* मोबाइल पर स्क्रीन फिक्स रखने के लिए CSS */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: #0e1215; 
            color: #fff; 
            font-family: sans-serif; 
            padding: 20px; 
            padding-bottom: 70px;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; background: #ffffff; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .save-btn { width: 100%; padding: 12px; background: #00d4ff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #bank-list-page { display: none; }
        .bank-card { background: #1c2227; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-top: 10px; }
        .add-more-btn { margin-top: 20px; text-align: center; color: #00d4ff; cursor: pointer; text-decoration: underline; }

        /* Navigation Bar */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c2227; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #fff; text-decoration: none; text-align: center; font-size: 12px; }
    </style>
</head>
<body>
    <script>
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    </script>

    <div id="add-bank-page">
        <h3>Add Bank Account</h3>
        <div class="input-group"><input type="text" id="holderName" placeholder="Account Holder Name"></div>
        <div class="input-group"><input type="text" id="accNum" placeholder="Account Number"></div>
        <div class="input-group"><input type="text" id="confirmAccNum" placeholder="Confirm Account Number"></div>
        <div class="input-group"><input type="text" id="ifscCode" placeholder="IFSC Code"></div>
        <div class="input-group"><input type="text" id="bankName" placeholder="Bank Name"></div>
        <button class="save-btn" onclick="saveBank()">SAVE</button>
    </div>

    <div id="bank-list-page">
        <h3>My Bank Accounts</h3>
        <div id="saved-details" class="bank-card"></div>
        <div class="add-more-btn" onclick="showAddPage()">+ More Add Bank</div>
    </div>

    <div class="navbar">
        <a href="dashboard.html" class="nav-item">🏠<br>Home</a>
        <a href="deposit.html" class="nav-item">💰<br>Deposit</a>
        <a href="bank.html" class="nav-item">🏦<br>Bank</a>
        <a href="team.html" class="nav-item">👥<br>Team</a>
        <a href="profile.html" class="nav-item">👤<br>Profile</a>
    </div>

    <script>
        function saveBank() {
            const holder = document.getElementById('holderName').value;
            const acc = document.getElementById('accNum').value;
            const confirmAcc = document.getElementById('confirmAccNum').value;
            const ifsc = document.getElementById('ifscCode').value;
            const bank = document.getElementById('bankName').value;

            if(acc !== confirmAcc) {
                alert("Account numbers do not match!");
                return;
            }

            if(holder && acc && ifsc && bank) {
                document.getElementById('saved-details').innerHTML = `
                    <p><strong>Name:</strong> ${holder}</p>
                    <p><strong>Account:</strong> ${acc}</p>
                    <p><strong>IFSC:</strong> ${ifsc}</p>
                    <p><strong>Bank:</strong> ${bank}</p>
                `;
                document.getElementById('add-bank-page').style.display = 'none';
                document.getElementById('bank-list-page').style.display = 'block';
            } else {
                alert("Please fill all details");
            }
        }

        function showAddPage() {
            document.getElementById('add-bank-page').style.display = 'block';
            document.getElementById('bank-list-page').style.display = 'none';
        }
    </script>
</body>
</html>

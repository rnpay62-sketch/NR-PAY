<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Randi Pay</title>
    <style>
        /* मोबाइल पर स्क्रीन फिक्स रखने के लिए CSS */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            touch-action: manipulation;
        }
        .form-container { width: 320px; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        .logo { width: 100px; margin-bottom: 20px; }
        input { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .register-link { margin-top: 15px; display: block; color: #007bff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <script>
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    </script>

<div class="form-container">
    <img src="14323.jpg" alt="Logo" class="logo">
    <h2>Login</h2>
    <input type="text" id="mobile" placeholder="Mobile Number" required>
    <input type="password" id="pass" placeholder="Password" required>
    
    <button onclick="login()">Login</button>

    <a href="register.html" class="register-link">Don't have an account? Register</a>
</div>

<script>
    async function login() {
        let mobile = document.getElementById('mobile').value;
        let pass = document.getElementById('pass').value;

        if (!mobile || !pass) { 
            alert("Please enter both mobile number and password"); 
            return; 
        }

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobile, pass })
            });

            const data = await response.json();

            if (data.success) {
                localStorage.setItem('userID', data.userID);
                localStorage.setItem('myReferralCode', data.myReferralCode);

                alert("Login Successful!");
                window.location.href = "dashboard.html";
            } else {
                alert("Error: " + (data.message || "Invalid Mobile or Password"));
            }
        } catch (err) {
            console.error(err);
            alert("Server connection error. Try again later.");
        }
    }
</script>

</body>
</html>

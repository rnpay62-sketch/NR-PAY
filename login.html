<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RN PAY Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f4f8; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .logo { width: 120px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: linear-gradient(to right, #6a11cb, #2575fc); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        a { color: #2575fc; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="13901.png" alt="Logo" class="logo">
    <h2>Welcome Back!</h2>
    <p>Login to your account</p>
    
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="password" id="password" placeholder="Password">
    
    <button onclick="loginUser()">Login Now</button>

    <p style="margin-top: 15px; font-size: 14px;">
        Don't have an account? <a href="/">Register</a>
    </p>
</div>

<script>
    async function loginUser() {
        const mobile = document.getElementById('mobile').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobile, password })
            });

            const data = await response.json();
            if(data.success) {
                alert("Login Successful!");
                // यहाँ से तुम उसे गेम वाले पेज पर भेज सकते हो
                window.location.href = '/dashboard.html'; 
            } else {
                alert(data.message || "Login failed!");
            }
        } catch (error) {
            alert("Server se connection nahi ho raha hai!");
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <input type="text" id="mobile" placeholder="Mobile Number">
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <input type="text" id="referralCode" placeholder="Referral Code">
        
        <button onclick="registerUser()">Register Now</button>
        <p>Already have an account? <a href="/login">Login</a></p>
    </div>

    <script>
        async function registerUser() {
            const mobile = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const referralCode = document.getElementById('referralCode').value;

            if(password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, password, referralCode })
                });

                const data = await response.json();
                if(data.success) {
                    alert("Registration Successful! Your ID: " + data.userId);
                } else {
                    alert(data.message || "Registration failed!");
                }
            } catch (error) {
                alert("Server connection error!");
            }
        }
    </script>
</body>
</html>

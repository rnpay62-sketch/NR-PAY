<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <input type="text" id="mobile" placeholder="Mobile Number">
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <input type="text" id="referralCode" placeholder="Referral Code">
        
        <div id="statusMessage" style="margin: 10px 0; font-weight: bold;"></div>
        
        <button id="regBtn" onclick="registerUser()">Register Now</button>
        <p>Already have an account? <a href="/login">Login</a></p>
    </div>

    <script>
        async function registerUser() {
            const mobile = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const referralCode = document.getElementById('referralCode').value;
            const statusDiv = document.getElementById('statusMessage');

            if(password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            // लोडिंग दिखाओ
            statusDiv.innerText = "Loading...";
            document.getElementById('regBtn').disabled = true;

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, password, referralCode })
                });

                const data = await response.json();
                
                if(data.success) {
                    // यहाँ आईडी नंबर दिखेगा
                    statusDiv.style.color = "green";
                    statusDiv.innerText = "Registration Successful! Your ID: " + data.userId;
                    alert("Registration Successful! Your ID: " + data.userId);
                } else {
                    statusDiv.style.color = "red";
                    statusDiv.innerText = data.message || "Registration failed!";
                }
            } catch (error) {
                statusDiv.style.color = "red";
                statusDiv.innerText = "Server connection error!";
            } finally {
                document.getElementById('regBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
